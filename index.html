<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NovoAprendiz :: Monitor</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=VT323&display=swap');

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    background: #0a0a0f;
    color: #00ff41;
    font-family: 'VT323', monospace;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
}

body::before {
    content: '';
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: repeating-linear-gradient(
        0deg,
        rgba(0, 255, 65, 0.03) 0px,
        rgba(0, 255, 65, 0.03) 1px,
        transparent 1px,
        transparent 2px
    );
    pointer-events: none;
    z-index: 1;
}

body::after {
    content: '';
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: radial-gradient(ellipse at center, transparent 0%, rgba(10, 10, 15, 0.8) 100%);
    pointer-events: none;
    z-index: 2;
}

.container {
    position: relative;
    z-index: 10;
    text-align: center;
    padding: 40px;
}

.blink {
    animation: blink 1s step-end infinite;
}

@keyframes blink {
    50% { opacity: 0; }
}

.header {
    font-size: 14px;
    color: #ff0040;
    margin-bottom: 30px;
    letter-spacing: 4px;
    text-transform: uppercase;
}

.header::before {
    content: '[ ';
    color: #00ff41;
}

.header::after {
    content: ' ]';
    color: #00ff41;
}

.line {
    height: 1px;
    background: linear-gradient(90deg, transparent, #00ff41, transparent);
    margin: 20px auto;
    width: 400px;
    opacity: 0.5;
}

.stat {
    margin: 25px 0;
    font-size: 28px;
    letter-spacing: 2px;
}

.stat-label {
    color: #ff0040;
    font-size: 14px;
    text-transform: uppercase;
    letter-spacing: 3px;
    margin-bottom: 8px;
}

.stat-value {
    color: #00ff41;
    font-size: 48px;
    text-shadow: 0 0 10px rgba(0, 255, 65, 0.5), 0 0 20px rgba(0, 255, 65, 0.3);
}

.stat-value.warn {
    color: #ffaa00;
    text-shadow: 0 0 10px rgba(255, 170, 0, 0.5);
}

.game-name {
    color: #00ccff;
    font-size: 32px;
    text-shadow: 0 0 10px rgba(0, 204, 255, 0.5);
    margin-top: 10px;
    max-width: 500px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    display: inline-block;
}

.footer {
    margin-top: 40px;
    font-size: 12px;
    color: #333;
    letter-spacing: 2px;
}

.cursor {
    display: inline-block;
    width: 10px;
    height: 20px;
    background: #00ff41;
    margin-left: 4px;
    animation: blink 1s step-end infinite;
    vertical-align: middle;
}

.loading {
    color: #ffaa00;
    font-size: 18px;
}

.error {
    color: #ff0040;
    font-size: 18px;
}
</style>
</head>
<body>
<div class="container">
    <div class="header">NovoAprendiz Monitor v2.0</div>
    <div class="line"></div>

    <div class="stat">
        <div class="stat-label">Execucoes Totais</div>
        <div class="stat-value" id="total">---</div>
    </div>

    <div class="line"></div>

    <div class="stat">
        <div class="stat-label">Execucoes Neste Jogo</div>
        <div class="stat-value warn" id="game-count">---</div>
    </div>

    <div class="line"></div>

    <div class="stat">
        <div class="stat-label">Jogo Atual</div>
        <div class="game-name" id="game-name">---</div>
        <span class="cursor"></span>
    </div>

    <div class="line"></div>
    <div class="footer">SYSTEM ONLINE // CONNECTION SECURE</div>
</div>

<script>
const urlParams = new URLSearchParams(window.location.search);
const placeId = urlParams.get('p');

async function loadStats() {
    if (!placeId || !/^\d+$/.test(placeId) || placeId.length > 15) {
        document.getElementById('total').textContent = 'ERR';
        document.getElementById('game-count').textContent = 'ERR';
        document.getElementById('game-name').textContent = 'PARAMETRO INVALIDO';
        return;
    }

    try {
        const res = await fetch('/api/stats?placeId=' + placeId);
        const data = await res.json();

        document.getElementById('total').textContent = data.total !== undefined ? data.total.toLocaleString('pt-BR') : '---';
        document.getElementById('game-count').textContent = data.gameCount !== undefined ? data.gameCount.toLocaleString('pt-BR') : '---';
        document.getElementById('game-name').textContent = data.gameName ? data.gameName.substring(0, 50) : 'DESCONHECIDO';
    } catch (e) {
        document.getElementById('total').textContent = 'ERR';
        document.getElementById('game-count').textContent = 'ERR';
        document.getElementById('game-name').textContent = 'FALHA DE CONEXAO';
    }
}

loadStats();
</script>
</body>
</html>
